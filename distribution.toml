schema = 1
release = "1.2.0-canary.1"

# Every internal Rust consumer receives the same byte-identical vendored crate.
# `profile` is rollout metadata; products select presentation through semantic
# tokens/root attributes, never through a forked vendor payload.

[[consumer]]
path = "../anvil"
deployable = "anvil"
channel = "internal-rust"
profile = "control"
surfaces = 1

